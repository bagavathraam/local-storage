<script>

function signin(){
    var username =document.getElementById("i1").value;
    var password =document.getElementById("i2").value;
    var storedData =localStorage.getItem(username);

    if(storedData){
        var parsedData =JSON.parse(storedData);
        var storedUsername =parsedData.username;
        var storedPassword =parsedData.password;

        console.log(username,password,storedUsername,storedPassword);

        if(username === storedUsername && password === storedPassword){
            window.location.href="welcome.html";
        }
        else{
            alert("Enter the valid username")
        }
    }
    else{
        alert("Enter the username")
    }
}
